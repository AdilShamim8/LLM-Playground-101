pretraining:
  batch_size: 32
  gradient_accumulation_steps: 8
  learning_rate: 3.0e-4
  weight_decay: 0.1
  warmup_steps: 2000
  max_steps: 100000
  save_steps: 5000
  eval_steps: 1000
  fp16: true
  gradient_checkpointing: true
  
sft:
  batch_size: 16
  learning_rate: 2.0e-5
  num_epochs: 3
  max_length: 2048
  
rlhf:
  reward_model:
    learning_rate: 1.0e-5
    batch_size: 8
    num_epochs: 1
  ppo:
    learning_rate: 1.4e-5
    batch_size: 128
    ppo_epochs: 4
    gamma: 1.0
    lam: 0.95
    clip_range: 0.2
    vf_coef: 0.1
    kl_coef: 0.1