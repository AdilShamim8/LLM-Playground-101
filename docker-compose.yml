version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./checkpoints:/app/checkpoints
      - ./data:/app/data
    environment:
      - CUDA_VISIBLE_DEVICES=0
      - PYTHONUNBUFFERED=1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: >
      uvicorn api.main:app
      --host 0.0.0.0
      --port 8000
      --workers 1
      --loop asyncio
    restart: unless-stopped
    networks:
      - llm_net

  ui:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "7860:7860"
    depends_on:
      - api
    environment:
      - API_BASE=http://api:8000/api/v1
    command: python ui/app.py
    restart: unless-stopped
    networks:
      - llm_net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - llm_net

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: llm_user
      POSTGRES_PASSWORD: llm_password
      POSTGRES_DB: llm_playground
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - llm_net

networks:
  llm_net:
    driver: bridge

volumes:
  postgres_data: